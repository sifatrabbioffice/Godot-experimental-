name: 🧪 Build Godot iOS Editor from Master
on:
  workflow_dispatch:

jobs:
  ios-editor-master:
    runs-on: macos-14
    name: Godot Editor (Master, iOS)
    timeout-minutes: 120

    steps:
      - name: Checkout Godot
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master
          submodules: recursive

      - name: Compile editor (arm64)
        run: |
          # Python এবং SCons দিয়ে বিল্ড করা (Godot অফিশিয়াল বিল্ড মেথড)
          python3 -m pip install scons
          scons platform=ios target=editor arch=arm64

      - name: Package Unsigned IPA
        run: |
          echo "Setting up Info.plist..."
          mkdir -p misc/dist/ios_xcode/godot_ios/
          
          # Info.plist তৈরি
          cat <<EOF > misc/dist/ios_xcode/godot_ios/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.godot.editor</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
          </dict>
          </plist>
          EOF

          cd misc/dist/ios_xcode
          
          # স্কিমের নাম খুঁজে বের করা (যাতে আর এরর না দেয়)
          SCHEME=$(xcodebuild -list | grep "Scheme:" -A 1 | tail -n 1 | xargs)
          echo "Using Scheme: $SCHEME"
          
          # বিল্ড করা
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # IPA তৈরি
          cd build/Release-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r GodotEditor_Master_Unsigned.ipa Payload/

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-editor-ipa
          path: misc/dist/ios_xcode/build/Release-iphoneos/GodotEditor_Master_Unsigned.ipa
