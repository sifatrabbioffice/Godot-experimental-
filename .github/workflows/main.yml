name: 🧪 Build Custom Godot Master Offline Editor

on:
  workflow_dispatch:

jobs:
  build-godot-from-source:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master  # আপনি চাইলে এখানে ৪.৭ বা নির্দিষ্ট রিলিজ ব্রাঞ্চ দিতে পারেন
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons

      - name: Setup Emscripten (emsdk)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64  # গডোট মাস্টার ব্রাঞ্চের জন্য অত্যন্ত স্থিতিশীল একটি সংস্করণ
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten Compiler
        run: |
          emcc -v

      - name: Compile Godot Web Editor from Source
        run: |
          cd godot-source
          # -j$(sysctl -n hw.ncpu) দিয়ে ম্যাকওএসের সবগুলো কোর ব্যবহার করে দ্রুত বিল্ড করা হচ্ছে
          # production=yes কোড অপ্টিমাইজ করে সাইজ ছোট করে এবং সিম্বল স্ট্রিপ করে
          scons platform=web target=editor threads=no production=yes -j$(sysctl -n hw.ncpu)

      - name: Setup Directory Structure for iOS App
        run: |
          mkdir -p build_stage/GodotWeb.app/godot_web

      - name: Process and Rename Compiled Assets
        run: |
          # সোর্স বিল্ডের পর ফাইলগুলো godot-source/bin/ ফোল্ডারে জমা হয়
          # আমরা ওয়াইল্ডকার্ড (*) ব্যবহার করে সেগুলোকে আমাদের কাঙ্ক্ষিত নামে স্থানান্তর করছি
          cd godot-source/bin
          mv *.html ../../build_stage/GodotWeb.app/godot_web/godot.editor.html
          mv *.js ../../build_stage/GodotWeb.app/godot_web/godot.editor.js
          mv *.wasm ../../build_stage/GodotWeb.app/godot_web/godot.editor.wasm

      - name: Generate High-Performance Swift Wrapper
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI
          import WebKit

          @main
          struct GodotWebApp: App {
              var body: some Scene {
                  WindowGroup { WebView().ignoresSafeArea() }
              }
          }

          class LocalSchemeHandler: NSObject, WKURLSchemeHandler {
              func webView(_ webView: WKWebView, start urlSchemeTask: WKURLSchemeTask) {
                  let path = urlSchemeTask.request.url?.path ?? "/godot.editor.html"
                  let fileName = path == "/" ? "/godot.editor.html" : path
                  let bundlePath = Bundle.main.bundlePath + "/godot_web" + fileName
                  
                  if let data = try? Data(contentsOf: URL(fileURLWithPath: bundlePath)) {
                      let contentType: String
                      if fileName.hasSuffix(".wasm") {
                          contentType = "application/wasm"
                      } else if fileName.hasSuffix(".js") {
                          contentType = "application/javascript"
                      } else {
                          contentType = "text/html"
                      }

                      let headers = [
                          "Content-Type": contentType,
                          "Cross-Origin-Opener-Policy": "same-origin",
                          "Cross-Origin-Embedder-Policy": "require-corp",
                          "Access-Control-Allow-Origin": "*"
                      ]
                      let response = HTTPURLResponse(url: urlSchemeTask.request.url!, statusCode: 200, httpVersion: "HTTP/1.1", headerFields: headers)!
                      urlSchemeTask.didReceive(response)
                      urlSchemeTask.didReceive(data)
                      urlSchemeTask.didFinish()
                  } else {
                      let response = HTTPURLResponse(url: urlSchemeTask.request.url!, statusCode: 404, httpVersion: "HTTP/1.1", headerFields: nil)!
                      urlSchemeTask.didReceive(response)
                      urlSchemeTask.didFinish()
                  }
              }
              func webView(_ webView: WKWebView, stop urlSchemeTask: WKURLSchemeTask) {}
          }

          struct WebView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.setURLSchemeHandler(LocalSchemeHandler(), forURLScheme: "godot")
                  config.defaultWebpagePreferences.allowsContentJavaScript = true
                  
                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.load(URLRequest(url: URL(string: "godot://local/godot.editor.html")!))
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          EOF

      - name: Generate Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotWeb.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotWeb</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.offline</string>
              <key>CFBundleName</key>
              <string>GodotWeb</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIFileSharingEnabled</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Compile Swift App and Package IPA
        run: |
          # সঠিক iOS SDK লিংক করে অ্যাপ বাইনারি তৈরি
          xcrun --sdk iphoneos swiftc -target arm64-apple-ios15.0 -O -parse-as-library \
            build_stage/App.swift -o build_stage/GodotWeb.app/GodotWeb
            
          chmod +x build_stage/GodotWeb.app/GodotWeb
          
          mkdir -p Payload
          mv build_stage/GodotWeb.app Payload/
          
          # Ad-hoc কোড সাইনিং রানটাইম ক্র্যাশ এড়াতে
          codesign --force --deep --sign - Payload/GodotWeb.app
          
          zip -r GodotMasterOffline.ipa Payload/

      - name: Upload Custom Editor IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-master-source-ipa
          path: GodotMasterOffline.ipa
