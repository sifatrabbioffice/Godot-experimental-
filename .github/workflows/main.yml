name: 🧪 Build Offline Godot Web View IPA
on:
  workflow_dispatch:

jobs:
  build-offline-ipa:
    runs-on: macos-15
    name: Godot Offline Editor (iOS Wrapper)
    steps:
      - name: Setup Structure
        run: |
          mkdir -p build_stage/GodotWeb.app/godot_web

      - name: Download Offline Assets
        run: |
          cd build_stage/GodotWeb.app/godot_web
          BASE="https://editor.godotengine.org/releases/4.3.stable"
          curl -fO "$BASE/godot.editor.html"
          curl -fO "$BASE/godot.editor.js"
          curl -fO "$BASE/godot.editor.wasm"

      - name: Generate Swift Source
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI
          import WebKit

          @main
          struct GodotWebApp: App {
              var body: some Scene {
                  WindowGroup { WebView().ignoresSafeArea() }
              }
          }

          class LocalSchemeHandler: NSObject, WKURLSchemeHandler {
              func webView(_ webView: WKWebView, start urlSchemeTask: WKURLSchemeTask) {
                  guard let url = urlSchemeTask.request.url else { return }
                  let path = url.path.isEmpty || url.path == "/" ? "/godot.editor.html" : url.path
                  let bundlePath = Bundle.main.bundlePath + "/godot_web" + path
                  
                  if let data = FileManager.default.contents(atPath: bundlePath) {
                      let headers = [
                          "Content-Type": path.hasSuffix(".wasm") ? "application/wasm" : "text/html",
                          "Cross-Origin-Opener-Policy": "same-origin",
                          "Cross-Origin-Embedder-Policy": "require-corp"
                      ]
                      let response = HTTPURLResponse(url: url, statusCode: 200, httpVersion: "HTTP/1.1", headerFields: headers)!
                      urlSchemeTask.didReceive(response)
                      urlSchemeTask.didReceive(data)
                      urlSchemeTask.didFinish()
                  }
              }
              func webView(_ webView: WKWebView, stop urlSchemeTask: WKURLSchemeTask) {}
          }

          struct WebView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.setURLSchemeHandler(LocalSchemeHandler(), forURLScheme: "godot")
                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.load(URLRequest(url: URL(string: "godot://local/godot.editor.html")!))
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          EOF

      - name: Generate Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotWeb.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotWeb</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.offline</string>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Compile and Package
        run: |
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphoneos)
          # The -parse-as-library flag is required to use @main
          swiftc -target arm64-apple-ios15.0 \
                 -sdk "$SDK_PATH" \
                 -O \
                 -parse-as-library \
                 build_stage/App.swift \
                 -o build_stage/GodotWeb.app/GodotWeb
          
          mkdir -p Payload
          mv build_stage/GodotWeb.app Payload/
          zip -r GodotOffline.ipa Payload/
