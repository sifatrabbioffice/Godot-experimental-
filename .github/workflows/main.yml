name: 🧪 Build Godot iOS Editor from Master
on:
  workflow_dispatch:

env:
  SCONS_FLAGS: >-
    dev_mode=yes
    module_text_server_fb_enabled=yes
    debug_symbols=no

jobs:
  ios-editor-master:
    runs-on: macos-14
    name: Godot Editor (Master, iOS)
    timeout-minutes: 120

    steps:
      # ১. মূল ডিরেক্টরিতে Godot-এর অফিশিয়াল কোড ক্লোন করা
      - name: Checkout Godot Master Branch
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master
          submodules: recursive
          fetch-depth: 1 # পেশাদার টিপ: মেমোরি ও সময় বাঁচাতে শুধু লেটেস্ট কমিট নেওয়া হচ্ছে

      # ২. আপনার নিজস্ব রিপোজিটরি একটি সাব-ফোল্ডারে ক্লোন করা (অ্যাকশন স্ক্রিপ্টগুলোর জন্য)
      - name: Checkout Custom Build Actions
        uses: actions/checkout@v4
        with:
          path: my-actions # আপনার কোড এই ফোল্ডারে জমা হবে

      # ৩. সাব-ফোল্ডার থেকে ক্যাশ রিস্টোর অ্যাকশন রান করা
      - name: Restore Godot build cache
        uses: ./my-actions/.github/actions/godot-cache-restore
        continue-on-error: true

      # ৪. সাব-ফোল্ডার থেকে ডিপেন্ডেন্সি সেটআপ অ্যাকশন রান করা
      - name: Setup Python and SCons
        uses: ./my-actions/.github/actions/godot-deps

      # ৫. সাব-ফোল্ডারের বিল্ড স্ক্রিপ্ট ব্যবহার করে কম্পাইল করা
      - name: Compile editor (arm64)
        uses: ./my-actions/.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }}
          platform: ios
          target: editor

      # ৬. ক্যাশ সেভ করা
      - name: Save Godot build cache
        uses: ./my-actions/.github/actions/godot-cache-save
        continue-on-error: true

      # ৭. Unsigned IPA প্যাকেজিং করা
      - name: Package Unsigned IPA
        run: |
          echo "Packaging the Compiled Framework into an Unsigned IPA..."
          
          # Library Rename
          cd bin/
          EDITOR_LIB=$(ls libgodot.ios.editor.*.a | head -n 1)
          cp "$EDITOR_LIB" "libgodot.ios.template_release.arm64.a"
          cd ..

          # File Sharing Permission Enable
          plutil -replace UIFileSharingEnabled -bool YES misc/dist/ios_xcode/godot_ios/Info.plist
          plutil -replace LSSupportsOpeningDocumentsInPlace -bool YES misc/dist/ios_xcode/godot_ios/Info.plist

          # Xcode Build without Code Signing
          cd misc/dist/ios_xcode
          xcodebuild -project godot_ios.xcodeproj \
            -target godot_ios \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # Create IPA Struct
          cd build/Release-iphoneos
          mkdir Payload
          mv godot_ios.app Payload/
          zip -r GodotEditor_Master_Unsigned.ipa Payload/

      # ৮. IPA ফাইলটি আর্টিফ্যাক্ট হিসেবে আপলোড করা
      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-editor-master-unsigned-ipa
          path: misc/dist/ios_xcode/build/Release-iphoneos/GodotEditor_Master_Unsigned.ipa
          if-no-files-found: error
