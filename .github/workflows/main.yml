name: 📱 Complete iOS .app & .ipa Compiler for Godot 4.7

on:
  workflow_dispatch:

jobs:
  compile-and-package-ipa:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: '4.7'
          path: godot-source

      - name: Setup Build Environment
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Compile Godot Engine for iOS (A17 Pro/arm64)
        run: |
          cd godot-source
          # SCons দিয়ে আইফোনের জন্য কোর ইঞ্জিন স্ট্যাটিক লাইব্রেরি (.a) কম্পাইল করা হচ্ছে
          scons platform=ios target=editor arch=arm64 precision=single -j$(sysctl -n hw.ncpu)

      - name: Create Structure, Link Components and Build .app Bundle
        run: |
          # ১. iOS এর অফিশিয়াল নিয়ম অনুযায়ী Payload/ অ্যাপ ফোল্ডার তৈরি
          mkdir -p Payload/GodotEditor.app
          
          # ২. অ্যাপলের Xcode SDK পাথ লোড করা
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          echo "=== স্ট্যাটিক লাইব্রেরিগুলোকে লিংক করে রানযোগ্য এক্সিকিউটেবল তৈরি করা হচ্ছে ==="
          # ৩. clang++ লিঙ্কার ব্যবহার করে SCons এর তৈরি ফাইলগুলোকে আইফোনের ফ্রেমওয়ার্কের সাথে জোড়া হচ্ছে
          xcrun --sdk iphoneos clang++ -target arm64-apple-ios17.0 \
            -isysroot "$SDK_PATH" \
            godot-source/bin/*.a \
            -framework UIKit -framework Foundation -framework Metal -framework MetalKit \
            -framework CoreGraphics -framework QuartzCore -framework AudioToolbox \
            -framework AVFoundation -framework CoreAudio -framework CoreMIDI \
            -framework CoreMotion -framework GameController -framework Security \
            -framework CoreVideo -framework IOKit -framework OpenGLES \
            -lc++ -lz \
            -o Payload/GodotEditor.app/GodotEditor

          # ৪. মেইন এক্সিকিউটেবল ফাইলটিকে সিস্টেমে রান করার অনুমতি (Execution Permission) দেওয়া
          chmod +x Payload/GodotEditor.app/GodotEditor

      - name: Inject Configuration (Info.plist) into .app
        run: |
          # ৫. .app বান্ডেলের ভেতরে অ্যাপের পরিচয়পত্র বা Info.plist ফাইল তৈরি করা
          cat << 'EOF' > Payload/GodotEditor.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotEditor</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.ioseditor</string>
              <key>CFBundleName</key>
              <string>Godot 4.7</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.7</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
                  <string>metal</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Apply Ad-Hoc Code Signature to .app
        run: |
          # 🖥️ আইফোনের সিকিউরিটি সিস্টেম পাস করার জন্য অ্যাড-হক ডিজিটাল সাইনিং করা
          echo "Signing the .app bundle..."
          codesign --force --deep --sign - Payload/GodotEditor.app

      - name: Compress and Package into Final .ipa
        run: |
          # 📦 Payload ফোল্ডারটিকে জিপ করে অফিশিয়াল .ipa ফাইলে রূপান্তর করা
          echo "Packaging Payload into Godot_Editor_iPhone15ProMax.ipa..."
          zip -r Godot_Editor_iPhone15ProMax.ipa Payload/

      - name: Upload Production Ready IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-pure-native-ipa
          path: Godot_Editor_iPhone15ProMax.ipa
