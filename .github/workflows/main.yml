name: 🧪 Build Optimized Offline Master Editor
on:
  workflow_dispatch:

jobs:
  build-optimized-editor:
    runs-on: macos-15
    name: Godot Master Offline (High Performance)
    steps:
      - name: Setup Directory
        run: mkdir -p build_stage/GodotWeb.app/godot_web

      - name: Download Offline Assets
        run: |
          cd build_stage/GodotWeb.app/godot_web
          # Pointing to the validated stable CDN release path
          BASE="https://editor.godotengine.org/releases/4.3.stable"
          
          # Downloading with fallback logging
          curl -L -fO "$BASE/godot.editor.html" || { echo "Failed to download HTML"; exit 1; }
          curl -L -fO "$BASE/godot.editor.js" || { echo "Failed to download JS"; exit 1; }
          curl -L -fO "$BASE/godot.editor.wasm" || { echo "Failed to download Wasm"; exit 1; }


      - name: Generate High-Performance Swift
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI
          import WebKit

          @main
          struct GodotWebApp: App {
              var body: some Scene {
                  WindowGroup { WebView().ignoresSafeArea() }
              }
          }

          class LocalSchemeHandler: NSObject, WKURLSchemeHandler {
              // Pre-load assets into memory for faster access
              private var cache: [String: Data] = [:]

              func webView(_ webView: WKWebView, start urlSchemeTask: WKURLSchemeTask) {
                  let path = urlSchemeTask.request.url?.path ?? "/godot.editor.html"
                  let fileName = path == "/" ? "/godot.editor.html" : path
                  
                  if let data = cache[fileName] ?? loadFromBundle(fileName) {
                      cache[fileName] = data
                      let headers = [
                          "Content-Type": fileName.hasSuffix(".wasm") ? "application/wasm" : "text/html",
                          "Cross-Origin-Opener-Policy": "same-origin",
                          "Cross-Origin-Embedder-Policy": "require-corp",
                          "Cache-Control": "max-age=31536000" // Cache aggressively
                      ]
                      let response = HTTPURLResponse(url: urlSchemeTask.request.url!, statusCode: 200, httpVersion: "HTTP/1.1", headerFields: headers)!
                      urlSchemeTask.didReceive(response)
                      urlSchemeTask.didReceive(data)
                      urlSchemeTask.didFinish()
                  }
              }
              
              private func loadFromBundle(_ path: String) -> Data? {
                  let fullPath = Bundle.main.bundlePath + "/godot_web" + path
                  return try? Data(contentsOf: URL(fileURLWithPath: fullPath))
              }
              
              func webView(_ webView: WKWebView, stop urlSchemeTask: WKURLSchemeTask) {}
          }

          struct WebView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.setURLSchemeHandler(LocalSchemeHandler(), forURLScheme: "godot")
                  let webView = WKWebView(frame: .zero, configuration: config)
                  // Use hardware acceleration
                  webView.configuration.preferences.setValue(true, forKey: "allowFileAccessFromFileURLs")
                  webView.load(URLRequest(url: URL(string: "godot://local/godot.editor.html")!))
                  return webView
              }
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          EOF

      - name: Compile Optimized Binary
        run: |
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphoneos)
          # Optimized for speed (-O) with library parsing
          swiftc -target arm64-apple-ios15.0 -sdk "$SDK_PATH" -O -parse-as-library \
            build_stage/App.swift -o build_stage/GodotWeb.app/GodotWeb
            
          # Prepare Payload
          mkdir -p Payload
          mv build_stage/GodotWeb.app Payload/
          zip -r GodotMaster_Optimized.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-master-optimized-ipa
          path: GodotMaster_Optimized.ipa
