name: 🧪 Build Godot iOS Editor from Master
on:
  workflow_dispatch:

env:
  SCONS_FLAGS: >-
    dev_mode=yes
    module_text_server_fb_enabled=yes
    debug_symbols=no
jobs:
  ios-editor-master:
    runs-on: macos-15
    name: Godot Editor (Master, iOS)
    timeout-minutes: 120

    steps:
      # ১. Godot-এর অফিশিয়াল রিপোজিটরি (Master Branch) ক্লোন করা
      - name: Checkout Godot Master Branch
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master
          submodules: recursive

      # ২. ক্যাশ এবং ডিপেন্ডেন্সি সেটআপ
      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # ৩. Editor কম্পাইল করা
      - name: Compile editor (arm64)
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }}
          platform: ios
          target: editor

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        continue-on-error: true

      # ৪. Unsigned IPA তৈরি করা (current apple_embedded_xcode layout)
      - name: Package Unsigned IPA
        run: |
          echo "Preparing to build Unsigned IPA from Master Branch..."

          # The compiled lib is a raw static archive (libgodot.ios.editor.arm64.a).
          # The current project (apple_embedded_xcode) expects a properly
          # assembled .xcframework, not a renamed .a — so build one.
          cd bin/
          EDITOR_LIB=$(ls libgodot.ios.editor.*.a | head -n 1)
          cd ..

          XCFRAMEWORK_DEST="misc/dist/apple_embedded_xcode/libgodot.ios.release.xcframework"
          rm -rf "$XCFRAMEWORK_DEST"
          xcodebuild -create-xcframework \
            -library "bin/$EDITOR_LIB" \
            -output "$XCFRAMEWORK_DEST"

          # File Sharing Permission (path updated for current layout)
          PLIST="misc/dist/apple_embedded_xcode/godot_apple_embedded/godot_apple_embedded-Info.plist"
          plutil -replace UIFileSharingEnabled -bool YES "$PLIST"
          plutil -replace LSSupportsOpeningDocumentsInPlace -bool YES "$PLIST"

          # Disable Code Signing and Build
          cd misc/dist/apple_embedded_xcode
          xcodebuild -project godot_apple_embedded.xcodeproj \
            -target godot_apple_embedded \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # IPA Packaging
          cd build/Release-iphoneos
          mkdir Payload
          mv godot_apple_embedded.app Payload/
          zip -r GodotEditor_Master_Unsigned.ipa Payload/

      # ৫. তৈরি হওয়া IPA ফাইলটি আপলোড করা
      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-editor-master-unsigned-ipa
          path: misc/dist/apple_embedded_xcode/build/Release-iphoneos/GodotEditor_Master_Unsigned.ipa
          if-no-files-found: error
