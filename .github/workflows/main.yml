name: 🧪 Build Godot iOS Editor from Master
on:
  workflow_dispatch:

env:
  SCONS_FLAGS: >-
    dev_mode=yes
    module_text_server_fb_enabled=yes
    debug_symbols=no

jobs:
  ios-editor-master:
    runs-on: macos-15
    name: Godot Editor (Master, iOS)
    timeout-minutes: 120

    steps:
      # ১. Godot-এর অফিশিয়াল কোড (Master Branch) ক্লোন করা
      - name: Checkout Godot Master Branch
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master
          submodules: recursive
          fetch-depth: 1

      # ২. ক্যাশ রিস্টোর (সরাসরি Godot-এর অফিশিয়াল রিপোজিটরি থেকে অ্যাকশন কল করা)
      - name: Restore Godot build cache
        uses: godotengine/godot/.github/actions/godot-cache-restore@master
        continue-on-error: true

      # ৩. ডিপেন্ডেন্সি সেটআপ (Python এবং SCons ইন্সটল)
      - name: Setup Python and SCons
        uses: godotengine/godot/.github/actions/godot-deps@master

      # ৪. Editor কম্পাইল করা (Godot-এর নিজস্ব বিল্ড স্ক্রিপ্ট ব্যবহার করে)
      - name: Compile editor (arm64)
        uses: godotengine/godot/.github/actions/godot-build@master
        with:
          scons-flags: ${{ env.SCONS_FLAGS }}
          platform: ios
          target: editor

      # ৫. পরবর্তী বিল্ড দ্রুত করার জন্য ক্যাশ সেভ করা
      - name: Save Godot build cache
        uses: godotengine/godot/.github/actions/godot-cache-save@master
        continue-on-error: true

      # ৬. Xcode ব্যবহার করে Unsigned IPA তৈরি করা
      - name: Package Unsigned IPA
        run: |
          echo "Packaging the Compiled Framework into an Unsigned IPA..."
          
          # লাইব্রেরি রিনেম (যাতে Xcode এটি সহজে খুঁজে পায়)
          cd bin/
          EDITOR_LIB=$(ls libgodot.ios.editor.*.a | head -n 1)
          cp "$EDITOR_LIB" "libgodot.ios.template_release.arm64.a"
          cd ..

          # File Sharing পারমিশন চালু করা (প্রজেক্ট সেভ করার জন্য)
          plutil -replace UIFileSharingEnabled -bool YES misc/dist/ios_xcode/godot_ios/Info.plist
          plutil -replace LSSupportsOpeningDocumentsInPlace -bool YES misc/dist/ios_xcode/godot_ios/Info.plist

          # কোড সাইনিং ছাড়া (No Certificate) Xcode বিল্ড
          cd misc/dist/ios_xcode
          xcodebuild -project godot_ios.xcodeproj \
            -target godot_ios \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # IPA ফোল্ডার স্ট্রাকচার তৈরি এবং জিপ করা
          cd build/Release-iphoneos
          mkdir Payload
          mv godot_ios.app Payload/
          zip -r GodotEditor_Master_Unsigned.ipa Payload/

      # ৭. তৈরি করা IPA ফাইলটি ডাউনলোড করার জন্য আপলোড করা
      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-editor-master-unsigned-ipa
          path: misc/dist/ios_xcode/build/Release-iphoneos/GodotEditor_Master_Unsigned.ipa
          if-no-files-found: error
