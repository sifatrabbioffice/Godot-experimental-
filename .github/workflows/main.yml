name: 🧪 Build PURE Native Godot 4.7 iOS Editor

on:
  workflow_dispatch:

jobs:
  build-godot-native-ios:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: '4.7'
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Compile Real Godot Engine for iOS
        run: |
          cd godot-source
          # iPhone 15 Pro Max (A17 Pro) এর জন্য পিওর নেтивных ৬৪-বিট এডিটর কম্পাইল করা হচ্ছে
          scons platform=ios target=editor arch=arm64 precision=single -j$(sysctl -n hw.ncpu)

      - name: Create Real iOS App Bundle Structure
        run: |
          mkdir -p build_stage/GodotEditor.app

      - name: Inject Engine Binary into App Bundle
        run: |
          # SCons এর তৈরি করা আসল ১৬০+ মেগাবাইটের বাইনারি ফাইলটি অ্যাপ বান্ডেলের মেইন এক্সিকিউটেবল হিসেবে কপি করা হচ্ছে
          # কোনো ওভাররাইট ছাড়া সরাসরি মূল ফাইলটিকে স্থানান্তর করা হচ্ছে
          cp godot-source/bin/godot.ios.editor.arm64 build_stage/GodotEditor.app/GodotEditor
          chmod +x build_stage/GodotEditor.app/GodotEditor

      - name: Generate High-Performance Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotEditor.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotEditor</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.officialnativeeditor</string>
              <key>CFBundleName</key>
              <string>Godot</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.7</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              
              <!-- আইফোনের 'Files' অ্যাপের সাথে সরাসরি কানেক্ট করার মূল চাবিকাঠি -->
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              
              <!-- এডিটরটি যেন আইফোনে ল্যান্ডস্কেপ মোডে সুন্দরভাবে চলে -->
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
                  <string>metal</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Sign and Package Absolute Real IPA
        run: |
          mkdir -p Payload
          mv build_stage/GodotEditor.app Payload/
          
          # এড-হক সিগনেচার দিয়ে আইফোনে চলার উপযোগী করা হচ্ছে
          codesign --force --deep --sign - Payload/GodotEditor.app
          
          # জিপ করে আসল মেগাবাইটের আইপিএ ফাইল তৈরি
          zip -r Godot4.7_Native_iPhone15ProMax.ipa Payload/

      - name: Upload Complete Engine IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-4.7-pure-native-ipa
          path: Godot4.7_Native_iPhone15ProMax.ipa
