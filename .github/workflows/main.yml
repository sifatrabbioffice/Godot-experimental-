name: 🧪 Build Experimental Godot 4.7 iOS Master Editor

on:
  workflow_dispatch:

jobs:
  build-experimental-master-editor:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: '4.7'
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Compile Godot Core Engine with Full Editor Tools
        run: |
          cd godot-source
          # 'target=editor' দিয়ে সম্পূর্ণ গডট ইঞ্জিন ও প্রজেক্ট ম্যানেজারকে আইফোনের আর্কিটেকচারে কম্পাইল করা হচ্ছে
          scons platform=ios target=editor arch=arm64 precision=single -j$(sysctl -n hw.ncpu)

      - name: Create Structure and Link Master Binary
        run: |
          mkdir -p Payload/GodotMaster.app
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # clang++ লিঙ্কারের মাধ্যমে গডটের সমস্ত সোর্স ফাইলকে আইফোনের কোর ফ্রেমওয়ার্কের সাথে যুক্ত করা হচ্ছে
          xcrun --sdk iphoneos clang++ -target arm64-apple-ios17.0 \
            -isysroot "$SDK_PATH" \
            godot-source/bin/*.a \
            -framework UIKit -framework Foundation -framework Metal -framework MetalKit \
            -framework CoreGraphics -framework QuartzCore -framework AudioToolbox \
            -framework AVFoundation -framework CoreAudio -framework CoreMIDI \
            -framework CoreMotion -framework GameController -framework Security \
            -framework CoreVideo -framework IOKit -framework OpenGLES \
            -lc++ -lz \
            -o Payload/GodotMaster.app/GodotMaster

          chmod +x Payload/GodotMaster.app/GodotMaster

      - name: Generate Unrestricted Info.plist (Document Browser Mode)
        run: |
          # এই প্লাইস্ট ফাইলটি আইফোনের ফাইল সিস্টেমের লকডাউন ভেঙে দেয়
          cat << 'EOF' > Payload/GodotMaster.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotMaster</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.experimental.mastereditor</string>
              <key>CFBundleName</key>
              <string>Godot Master</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.7</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              
              <key>UISupportsDocumentBrowser</key>
              <true/>
              
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              
              <key>NSDocumentsFolderUsageDescription</key>
              <string>Godot Editor requires access to your local files to load and save game projects.</string>
              <key>NSCloudKitContainerEnvironment</key>
              <string>Development</string>
              
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
                  <string>metal</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate Master Entitlements (Bypass RAM & Debug Limits)
        run: |
          # এই স্পেশাল ফাইলটি অ্যাপল ডিভাইসের হার্ডওয়্যার রেস্ট্রিকশন শিথিল করে
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              
              <key>com.apple.developer.kernel.increased-memory-limit</key>
              <true/>
              
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Code Sign with Experimental Entitlements
        run: |
          # তৈরি করা এন্টাইটেলমেন্টস সহ অ্যাপটিকে ফোর্স সাইন করা হচ্ছে
          echo "Applying unrestricted entitlements..."
          codesign --force --deep --sign - --entitlements entitlements.plist Payload/GodotMaster.app

      - name: Package into Master IPA
        run: |
          echo "Packaging into Final Experimental IPA..."
          zip -r Godot4.7_Experimental_Master_iOS.ipa Payload/

      - name: Upload Finished Master IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-master-unrestricted-ipa
          path: Godot4.7_Experimental_Master_iOS.ipa
