name: 🧪 Build Godot Web View iOS IPA
on:
  workflow_dispatch:

jobs:
  build-webview-ipa:
    runs-on: macos-15
    name: Godot Web Editor (iOS Wrapper)
    timeout-minutes: 15

    steps:
      - name: Setup App Directory Structure
        run: |
          mkdir -p payload/GodotWeb.app
          cd payload

      - name: Generate SwiftUI WebKit Source
        run: |
          cat << 'EOF' > payload/App.swift
          import SwiftUI
          import WebKit

          @main
          struct GodotWebApp: App {
              var body: some Scene {
                  WindowGroup {
                      // Points to the latest stable web editor. 
                      // You can pin this to a specific version if preferred (e.g., /releases/4.2.1/)
                      WebView(url: URL(string: "https://editor.godotengine.org/releases/latest/")!)
                          .ignoresSafeArea()
                  }
              }
          }

          struct WebView: UIViewRepresentable {
              let url: URL
              
              func makeUIView(context: Context) -> WKWebView {
                  let prefs = WKWebpagePreferences()
                  prefs.allowsContentJavaScript = true
                  
                  let config = WKWebViewConfiguration()
                  config.defaultWebpagePreferences = prefs
                  config.allowsInlineMediaPlayback = true
                  
                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.isOpaque = false
                  webView.backgroundColor = UIColor.black
                  webView.scrollView.bounces = false
                  webView.scrollView.isScrollEnabled = false
                  
                  webView.load(URLRequest(url: url))
                  return webView
              }
              
              func updateUIView(_ webView: WKWebView, context: Context) {}
          }
          EOF

      - name: Generate Info.plist
        run: |
          cat << 'EOF' > payload/GodotWeb.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotWeb</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.webview</string>
              <key>CFBundleName</key>
              <string>Godot Web</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Compile Swift Binary (arm64)
        run: |
          echo "Compiling Swift source directly for iOS..."
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphoneos)
          
          # Direct compilation bypassing xcodebuild overhead
          swiftc -target arm64-apple-ios15.0 -sdk "$SDK_PATH" \
            -O -whole-module-optimization \
            -parse-as-library \
            payload/App.swift -o payload/GodotWeb.app/GodotWeb

      - name: Package Unsigned IPA
        run: |
          echo "Packaging application payload..."
          mkdir -p Payload
          mv payload/GodotWeb.app Payload/
          zip -r GodotWebView_Unsigned.ipa Payload/

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-webview-unsigned-ipa
          path: GodotWebView_Unsigned.ipa
          if-no-files-found: error
